<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Heart Disease Analytics{% endblock %} | HDInsight</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>" />
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <!-- Plotly -->
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block head_extra %}{% endblock %}
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-dark hd-navbar sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <span class="brand-icon"><i class="fa-solid fa-heart-pulse"></i></span>
      <span class="brand-text">HD<span class="text-danger">Insight</span></span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='index' %}active{% endif %}"
             href="{{ url_for('index') }}"><i class="fa-solid fa-house me-1"></i>Overview</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}"
             href="{{ url_for('dashboard') }}"><i class="fa-solid fa-chart-line me-1"></i>Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='analysis_page' %}active{% endif %}"
             href="{{ url_for('analysis_page') }}"><i class="fa-solid fa-microscope me-1"></i>Deep Analysis</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='story' %}active{% endif %}"
             href="{{ url_for('story') }}"><i class="fa-solid fa-book-open me-1"></i>Story</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='performance' %}active{% endif %}"
             href="{{ url_for('performance') }}"><i class="fa-solid fa-gauge-high me-1"></i>Performance</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Page content ──────────────────────────────────────── -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ──────────────────────────────────────────── -->
<footer class="hd-footer">
  <div class="container-fluid px-4 py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
    <span class="text-muted small">
      <i class="fa-solid fa-heart-pulse text-danger me-1"></i>
      HDInsight &mdash; Heart Disease Analytics Platform &copy; 2024
    </span>
    <span class="badge bg-secondary small">
      Dataset: {{ 4500 }} records &nbsp;|&nbsp; 18 Features
    </span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
